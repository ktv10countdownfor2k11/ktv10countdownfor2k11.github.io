<!doctype html>
<html lang="vi" class="h-full">
 <head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đếm ngược Kỳ thi vào 10</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Be+Vietnam+Pro:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    .font-orbitron { font-family: 'Orbitron', monospace; }
    .font-vietnam { font-family: 'Be Vietnam Pro', sans-serif; }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3), 0 0 40px rgba(59, 130, 246, 0.2); }
      50% { box-shadow: 0 0 30px rgba(139, 92, 246, 0.5), 0 0 60px rgba(59, 130, 246, 0.3); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    
    .time-card {
      animation: pulse-glow 3s ease-in-out infinite;
    }
    
    .float-animation {
      animation: float 4s ease-in-out infinite;
    }
    
    .title-shimmer {
      background: linear-gradient(90deg, #fff 0%, #c4b5fd 25%, #fff 50%, #93c5fd 75%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
    }
    
    .glass-effect {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .number-shadow {
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.5), 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    
    @keyframes rotate-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .rotate-bg {
      animation: rotate-slow 20s linear infinite;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full font-vietnam">
  <div id="app-wrapper" class="h-full w-full overflow-auto relative">
   <!-- Animated Background -->
   <div class="absolute inset-0 bg-gradient-to-br from-blue-600 via-purple-600 to-violet-700"></div><!-- Decorative Elements -->
   <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-10 left-10 w-72 h-72 bg-blue-400/20 rounded-full blur-3xl rotate-bg"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-purple-400/20 rounded-full blur-3xl rotate-bg" style="animation-direction: reverse;"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-violet-500/10 rounded-full blur-3xl"></div>
   </div><!-- Floating Particles -->
   <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-20 left-[20%] w-2 h-2 bg-white/30 rounded-full float-animation"></div>
    <div class="absolute top-40 right-[25%] w-3 h-3 bg-white/20 rounded-full float-animation" style="animation-delay: 1s;"></div>
    <div class="absolute bottom-32 left-[30%] w-2 h-2 bg-white/25 rounded-full float-animation" style="animation-delay: 2s;"></div>
    <div class="absolute top-[60%] right-[15%] w-4 h-4 bg-white/15 rounded-full float-animation" style="animation-delay: 0.5s;"></div>
   </div><!-- Main Content -->
   <main class="relative z-10 h-full flex flex-col items-center justify-center px-4 py-8">
    <!-- Title Section -->
    <div class="text-center mb-8 md:mb-12">
     <div class="inline-block mb-4">
      <svg class="w-16 h-16 md:w-20 md:h-20 mx-auto text-white/80 float-animation" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
       <path d="M12 8v4l3 3" stroke-linecap="round" stroke-linejoin="round" /> <circle cx="12" cy="12" r="9" /> <path d="M12 3v2M12 19v2M3 12h2M19 12h2" stroke-linecap="round" />
      </svg>
     </div>
     <h1 id="main-title" class="text-3xl md:text-5xl lg:text-6xl font-extrabold title-shimmer mb-3">Kỳ thi vào 10 năm 2026</h1>
     <p id="subtitle" class="text-white/70 text-lg md:text-xl font-medium">Hãy chuẩn bị thật tốt cho ngày quan trọng!</p>
    </div><!-- Countdown Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 lg:gap-8 max-w-4xl w-full mb-8 md:mb-12">
     <!-- Days -->
     <div class="time-card glass-effect rounded-2xl md:rounded-3xl p-4 md:p-6 text-center transform hover:scale-105 transition-transform duration-300">
      <div class="relative">
       <span id="days" class="font-orbitron text-5xl md:text-6xl lg:text-7xl font-black text-white number-shadow block"> 000 </span>
       <div class="absolute -top-2 -right-2 w-4 h-4 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full animate-pulse"></div>
      </div>
      <p class="text-white/80 text-sm md:text-base font-semibold mt-2 uppercase tracking-wider">Ngày</p>
     </div><!-- Hours -->
     <div class="time-card glass-effect rounded-2xl md:rounded-3xl p-4 md:p-6 text-center transform hover:scale-105 transition-transform duration-300" style="animation-delay: 0.2s;">
      <div class="relative">
       <span id="hours" class="font-orbitron text-5xl md:text-6xl lg:text-7xl font-black text-white number-shadow block"> 00 </span>
       <div class="absolute -top-2 -right-2 w-4 h-4 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-full animate-pulse" style="animation-delay: 0.3s;"></div>
      </div>
      <p class="text-white/80 text-sm md:text-base font-semibold mt-2 uppercase tracking-wider">Giờ</p>
     </div><!-- Minutes -->
     <div class="time-card glass-effect rounded-2xl md:rounded-3xl p-4 md:p-6 text-center transform hover:scale-105 transition-transform duration-300" style="animation-delay: 0.4s;">
      <div class="relative">
       <span id="minutes" class="font-orbitron text-5xl md:text-6xl lg:text-7xl font-black text-white number-shadow block"> 00 </span>
       <div class="absolute -top-2 -right-2 w-4 h-4 bg-gradient-to-br from-pink-400 to-rose-500 rounded-full animate-pulse" style="animation-delay: 0.6s;"></div>
      </div>
      <p class="text-white/80 text-sm md:text-base font-semibold mt-2 uppercase tracking-wider">Phút</p>
     </div><!-- Seconds -->
     <div class="time-card glass-effect rounded-2xl md:rounded-3xl p-4 md:p-6 text-center transform hover:scale-105 transition-transform duration-300" style="animation-delay: 0.6s;">
      <div class="relative">
       <span id="seconds" class="font-orbitron text-5xl md:text-6xl lg:text-7xl font-black text-white number-shadow block"> 00 </span>
       <div class="absolute -top-2 -right-2 w-4 h-4 bg-gradient-to-br from-green-400 to-emerald-500 rounded-full animate-pulse" style="animation-delay: 0.9s;"></div>
      </div>
      <p class="text-white/80 text-sm md:text-base font-semibold mt-2 uppercase tracking-wider">Giây</p>
     </div>
    </div><!-- Target Date Display -->
    <div class="glass-effect rounded-full px-6 py-3 md:px-8 md:py-4">
     <p class="text-white/90 text-sm md:text-base font-semibold flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
       <rect x="3" y="4" width="18" height="18" rx="2" ry="2" /> <line x1="16" y1="2" x2="16" y2="6" /> <line x1="8" y1="2" x2="8" y2="6" /> <line x1="3" y1="10" x2="21" y2="10" />
      </svg><span>Ngày thi: <strong class="text-white">11 - 12/05/2026</strong></span></p>
    </div><!-- Motivational Message -->
    <div id="message" class="mt-8 text-center">
     <p class="text-white/60 text-sm md:text-base italic">"Mỗi ngày đều là cơ hội để bạn tiến gần hơn đến ước mơ!"</p>
    </div>
   </main>
  </div>
  <script>
    const defaultConfig = {
      main_title: 'Kỳ thi vào 10 năm 2026',
      subtitle: 'Hãy chuẩn bị thật tốt cho ngày quan trọng!',
      background_start: '#2563eb',
      background_end: '#7c3aed',
      text_color: '#ffffff',
      accent_color: '#c4b5fd',
      font_family: 'Be Vietnam Pro'
    };

    const targetDate = new Date('2026-06-11T00:00:00').getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        document.getElementById('message').innerHTML = '<p class="text-yellow-300 text-lg font-bold animate-pulse">🎉 Kỳ thi đã bắt đầu! Chúc bạn thi tốt! 🎉</p>';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(3, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    async function onConfigChange(config) {
      const title = config.main_title || defaultConfig.main_title;
      const subtitle = config.subtitle || defaultConfig.subtitle;
      const bgStart = config.background_start || defaultConfig.background_start;
      const bgEnd = config.background_end || defaultConfig.background_end;
      const textColor = config.text_color || defaultConfig.text_color;
      const accentColor = config.accent_color || defaultConfig.accent_color;
      const fontFamily = config.font_family || defaultConfig.font_family;

      document.getElementById('main-title').textContent = title;
      document.getElementById('subtitle').textContent = subtitle;

      const wrapper = document.getElementById('app-wrapper');
      const bgDiv = wrapper.querySelector('div');
      bgDiv.style.background = `linear-gradient(to bottom right, ${bgStart}, ${bgEnd})`;

      document.querySelectorAll('.time-card span, h1').forEach(el => {
        el.style.color = textColor;
      });

      document.querySelectorAll('p, .text-white\\/80, .text-white\\/70').forEach(el => {
        el.style.color = accentColor;
      });

      document.body.style.fontFamily = `${fontFamily}, sans-serif`;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_start || defaultConfig.background_start,
            set: (value) => { config.background_start = value; window.elementSdk.setConfig({ background_start: value }); }
          },
          {
            get: () => config.background_end || defaultConfig.background_end,
            set: (value) => { config.background_end = value; window.elementSdk.setConfig({ background_end: value }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => { config.font_family = value; window.elementSdk.setConfig({ font_family: value }); }
        },
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['subtitle', config.subtitle || defaultConfig.subtitle]
      ]);
    }

    // Initialize
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
