    .legacy-btn {
  position: fixed;

  transition: .25s;
}

.legacy-btn:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.18);
}
    .time-box {

      padding: 22px 18px;
      border-radius: 26px;

    }

    .time {
      font-size: clamp(34px, 5vw, 60px);
      font-weight: 800;
      line-height: 1;
    }

    .label {
      margin-top: 10px;
      font-size: 15px;
      opacity: .8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tools-btn {
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 20;
      border: none;
      border-radius: 18px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.12);
      color: white;
      cursor: pointer;
      backdrop-filter: blur(14px);
      font-weight: 700;
      transition: .25s;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .tools-btn:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.18);
    }

    .tools-panel {
      position: fixed;
      top: 78px;
      right: 22px;
      width: 330px;
      background: rgba(17,24,39,.88);
      backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 18px;
      display: none;
      z-index: 20;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }

    .tools-panel.active {

      animation: fade .25s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {

    .tool-card {

<body>

  <div class="container">
    <div class="title">
      Kỳ thi tuyển sinh vào lớp 10<br>
      Hà Nội 2026 – 2027
    </div>

    <div class="status" id="status">
      Đang tải...
    </div>

    <div class="subject" id="subject">
      ...
    </div>

    <div class="countdown">

      <div class="time-box">
        <div class="time" id="days">0</div>
        <div class="label">Ngày</div>
      </div>

      <div class="time-box">
        <div class="time" id="hours">00</div>
        <div class="label">Giờ</div>
      </div>

      <div class="time-box">
        <div class="time" id="minutes">00</div>
        <div class="label">Phút</div>
      </div>

      <div class="time-box">
        <div class="time" id="seconds">00</div>
        <div class="label">Giây</div>
      </div>

    </div>

    <div class="footer">
      Múi giờ: Việt Nam (GMT+7)
    </div>
  </div>

  <script>
    const exams = [
      {
        name: "Ngữ Văn",
        start: "2026-05-30T08:00:00+07:00",
        duration: 120
      },
      {
        name: "Ngoại ngữ",
        start: "2026-05-30T14:00:00+07:00",
        duration: 60
      },
      {
        name: "Toán",
        start: "2026-05-31T08:00:00+07:00",
        duration: 120
      },
      {
        name: "Môn chuyên (Sáng)",
        start: "2026-06-01T08:00:00+07:00",
        duration: 150
      },
      {
        name: "Môn chuyên (Chiều)",
        start: "2026-06-01T14:00:00+07:00",
        duration: 150
      }
    ];

    function getCurrentExam() {
      const now = new Date();

      for (let exam of exams) {
        const start = new Date(exam.start);
        const end = new Date(start.getTime() + exam.duration * 60000);

        if (now < start) {
          return {
            type: "upcoming",
            exam,
            target: start
          };
        }

        if (now >= start && now <= end) {
          return {
            type: "ongoing",
            exam,
            target: end
          };
        }
      }

      return null;
    }

    function updateCountdown() {
      const data = getCurrentExam();

      if (!data) {
        document.getElementById("status").innerText =
          "🎉 Kỳ thi đã kết thúc";

        document.getElementById("subject").innerText =
          "Chúc các sĩ tử đạt kết quả thật tốt ✨";

        document.getElementById("days").innerText = "0";
        document.getElementById("hours").innerText = "00";
        document.getElementById("minutes").innerText = "00";
        document.getElementById("seconds").innerText = "00";

        return;
      }

      const now = new Date();
      const distance = data.target - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById("status").innerText =
        data.type === "ongoing"
          ? "🔴 Đang thi"
          : "🟣 Sắp thi";

      document.getElementById("subject").innerText =
        data.exam.name;

      // Không thêm số 0 đầu cho ngày
      document.getElementById("days").innerText = days;

      document.getElementById("hours").innerText =
        String(hours).padStart(2, "0");

      document.getElementById("minutes").innerText =
        String(minutes).padStart(2, "0");

      document.getElementById("seconds").innerText =
        String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    function toggleTools() {
      document.getElementById("toolsPanel")
        .classList.toggle("active");
    }

    // Đóng menu khi click ra ngoài
    document.addEventListener("click", function(e) {
      const panel = document.getElementById("toolsPanel");
      const btn = document.querySelector(".tools-btn");

      if (
        !panel.contains(e.target) &&
        !btn.contains(e.target)
      ) {
        panel.classList.remove("active");
      }
    });
  </script>
